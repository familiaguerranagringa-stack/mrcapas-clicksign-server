const STORAGE_KEY = "mrcapas_v3";
function loadColabs() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; } }
function saveColab(r) { const l = loadColabs(); l.unshift(r); localStorage.setItem(STORAGE_KEY, JSON.stringify(l)); }
function fmtData(s) { if (!s) return "__/__/____"; const [y,m,d] = s.split("-"); return `${d}/${m}/${y}`; }
function fmtCPF(v) { return v.replace(/\D/g,"").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2").slice(0,14); }
function hoje() { return new Date().toISOString().split("T")[0]; }

async function gerarPDF(conteudo) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  conteudo.forEach((t, i) => {
    if (i > 0) doc.addPage();
    doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text("MR. CAPAS – GRUPO ECONÔMICO FAMÍLIA GUERRA", 105, 14, { align: "center" });
    doc.setFontSize(9); doc.text(t.titulo.toUpperCase(), 105, 20, { align: "center" });
    doc.setLineWidth(0.4); doc.line(15, 23, 195, 23);
    doc.setFont("helvetica","normal"); doc.setFontSize(8.5);
    doc.text(doc.splitTextToSize(t.texto, 175), 15, 29);
  });
  return doc.output("datauristring").split(",")[1];
}

        <div style={{ maxWidth:680, margin:"50px auto", padding:"0 24px", textAlign:"center" }}>
          <div style={{ fontSize:12, color:"#c9a84c", letterSpacing:4, marginBottom:10 }}>GRUPO ECONÔMICO FAMÍLIA GUERRA</div>
          <h1 style={{ fontSize:30, fontWeight:400, color:"#f0ebe0", marginBottom:8 }}>Admissão de Colaboradores</h1>
          <p style={{ color:"#666", fontSize:13, marginBottom:40 }}>Preencha os dados, selecione os termos e envie para assinatura digital via ClickSign.</p>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:28 }}>
            <button onClick={() => { setTela("novo"); setEtapa(1); setResultado(null); setErro(null); setForm({ nome:"", cpf:"", email:"", whatsapp:"", cargo:"VENDEDOR", setor:"VENDAS", loja:"MR. CAPAS ARARUAMA", data:hoje() }); setSelecionados(TERMOS.filter(t=>t.obrigatorio).map(t=>t.id)); }}
              style={{ padding:"26px 20px", background:"linear-gradient(135deg,#c9a84c22,#c9a84c11)", border:"1px solid #c9a84c44", borderRadius:12, cursor:"pointer", color:"#e8c96e", fontSize:15, fontWeight:600 }}>
              ✦ Novo Colaborador
            </button>
            <button onClick={() => setTela("historico")} style={{ padding:"26px 20px", background:"#1a1a1a", border:"1px solid #333", borderRadius:12, cursor:"pointer", color:"#aaa", fontSize:15 }}>
              ☰ Ver Histórico
            </button>
          </div>
          <div style={{ background:"#111", border:"1px solid #222", borderRadius:12, padding:20, textAlign:"left" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <span style={{ fontSize:11, color:"#c9a84c", letterSpacing:2 }}>VERIFICAÇÃO LEGISLATIVA IA</span>
              <button onClick={consultarLegislacao} disabled={loadingLegal} style={{ padding:"5px 12px", background:"#c9a84c22", border:"1px solid #c9a84c44", borderRadius:6, color:"#e8c96e", fontSize:11, cursor:"pointer" }}>
                {loadingLegal ? "Consultando..." : "Verificar agora"}
              </button>
            </div>
            {legalInfo ? (
              <div>
                <div style={{ display:"flex", gap:8, marginBottom:6 }}><span>{legalInfo.status==="ok"?"✅":"⚠️"}</span><span style={{ fontSize:13, color:"#ddd" }}>{legalInfo.resumo}</span></div>
                {legalInfo.alertas?.map((a,i) => <div key={i} style={{ fontSize:12, color:"#f0a500", background:"#f0a50011", borderRadius:6, padding:"5px 10px", marginTop:5 }}>⚡ {a}</div>)}
                <div style={{ fontSize:11, color:"#555", marginTop:8 }}>Última verificação: {legalInfo.ultimaVerificacao}</div>
              </div>
            ) : <p style={{ fontSize:12, color:"#555", margin:0 }}>A IA verifica mudanças recentes na legislação trabalhista que afetam seus termos.</p>}
          </div>
        </div>
      )}

      {/* NOVO COLABORADOR */}
      {tela === "novo" && !resultado && (
        <div style={{ maxWidth:660, margin:"36px auto", padding:"0 24px" }}>
          {/* Steps */}
          <div style={{ display:"flex", gap:0, marginBottom:32 }}>
            {[{n:1,l:"Dados"},{n:2,l:"Termos"},{n:3,l:"Revisão"}].map((s,i) => (
              <div key={s.n} style={{ flex:1, display:"flex", alignItems:"center" }}>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flex:1 }}>
                  <div style={{ width:30, height:30, borderRadius:"50%", background: etapa>=s.n?"#c9a84c":"#222", border: etapa>=s.n?"none":"1px solid #333", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, color: etapa>=s.n?"#0a0a0a":"#555", marginBottom:4 }}>{s.n}</div>
                  <span style={{ fontSize:10, color: etapa>=s.n?"#c9a84c":"#555", letterSpacing:1 }}>{s.l.toUpperCase()}</span>
                </div>
                {i<2 && <div style={{ flex:1, height:1, background: etapa>s.n?"#c9a84c":"#222", marginBottom:18 }} />}
              </div>
            ))}
          </div>

          {/* ETAPA 1 */}
          {etapa === 1 && (
            <div style={S.card}>
              <h2 style={{ fontSize:17, fontWeight:600, color:"#e8c96e", marginBottom:22 }}>Dados do Colaborador</h2>
              <div style={{ display:"grid", gap:16 }}>
                {[{label:"Nome Completo *",key:"nome",type:"text",ph:"Nome completo"},{label:"CPF *",key:"cpf",type:"text",ph:"000.000.000-00"},{label:"E-mail *",key:"email",type:"email",ph:"email@exemplo.com"},{label:"WhatsApp",key:"whatsapp",type:"text",ph:"(22) 99999-9999"}].map(f => (
                  <div key={f.key}>
                    <label style={S.label}>{f.label.toUpperCase()}</label>
                    <input value={form[f.key]} onChange={e => setForm({...form, [f.key]: f.key==="cpf" ? fmtCPF(e.target.value) : e.target.value})} type={f.type} placeholder={f.ph} style={S.input} />
                  </div>
                ))}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
                  <div>
                    <label style={S.label}>CARGO *</label>
                    <select value={form.cargo} onChange={e => setForm({...form, cargo:e.target.value})} style={S.select}>
                      {CARGOS.map(c => <option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={S.label}>UNIDADE *</label>
                    <select value={form.loja} onChange={e => { const l=e.target.value; setForm({...form, loja:l, setor:(SETORES_POR_LOJA[l]||[])[0]||""}); }} style={S.select}>
                      {Object.keys(EMPRESAS).map(l => <option key={l}>{l}</option>)}
                    </select>
                  </div>
                </div>
                <div>
                  <label style={S.label}>SETOR *</label>
                  <select value={form.setor} onChange={e => setForm({...form, setor:e.target.value})} style={S.select}>
                    {(SETORES_POR_LOJA[form.loja]||[]).map(s => <option key={s}>{s}</option>)}
                  </select>
                  <div style={{ fontSize:10, color:"#555", marginTop:4 }}>{empresa.razaoSocial}</div>
                </div>
                <div>
                  <label style={S.label}>DATA DE ADMISSÃO *</label>
                  <input type="date" value={form.data} onChange={e => setForm({...form, data:e.target.value})} style={{...S.input, width:"auto"}} />
                </div>
              </div>
              <button onClick={() => { if (!form.nome||!form.cpf||!form.email) return alert("Preencha nome, CPF e e-mail."); setEtapa(2); }} style={{...S.btnPrimary, marginTop:24}}>Próximo →</button>
            </div>
          )}

          {/* ETAPA 2 */}
          {etapa === 2 && (
            <div style={S.card}>
              <h2 style={{ fontSize:17, fontWeight:600, color:"#e8c96e", marginBottom:6 }}>Selecionar Termos</h2>
              <p style={{ fontSize:12, color:"#666", marginBottom:20 }}>Os obrigatórios já estão marcados.</p>
              <div style={{ display:"grid", gap:8 }}>
                {TERMOS.map(t => {
                  const ativo = selecionados.includes(t.id);
                  return (
                    <div key={t.id} onClick={() => { if (t.obrigatorio) return; setSelecionados(p => p.includes(t.id) ? p.filter(x=>x!==t.id) : [...p,t.id]); }}
                      style={{ display:"flex", gap:12, padding:"12px 14px", background: ativo?"#c9a84c11":"#1a1a1a", border:`1px solid ${ativo?"#c9a84c55":"#2a2a2a"}`, borderRadius:10, cursor: t.obrigatorio?"default":"pointer" }}>
                      <div style={{ width:18, height:18, borderRadius:4, background: ativo?"#c9a84c":"#222", border:`1px solid ${ativo?"#c9a84c":"#444"}`, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, color:"#0a0a0a", marginTop:2 }}>{ativo&&"✓"}</div>
                      <div>
                        <div style={{ fontSize:13, fontWeight:600, color: ativo?"#e8c96e":"#999" }}>
                          {t.titulo}
                          {t.obrigatorio && <span style={{ fontSize:9, background:"#c9a84c22", color:"#c9a84c", borderRadius:4, padding:"2px 6px", marginLeft:8 }}>OBRIGATÓRIO</span>}
                        </div>
                        <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{t.descricao}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ display:"flex", gap:10, marginTop:24 }}>
                <button onClick={() => setEtapa(1)} style={S.btnSecondary}>← Voltar</button>
                <button onClick={() => setEtapa(3)} style={{...S.btnPrimary, flex:2, width:"auto"}}>Revisar →</button>
              </div>
            </div>
          )}

          {/* ETAPA 3 */}
          {etapa === 3 && (
            <div style={S.card}>
              <h2 style={{ fontSize:17, fontWeight:600, color:"#e8c96e", marginBottom:20 }}>Revisão Final</h2>
              <div style={{ background:"#1a1a1a", borderRadius:10, padding:18, marginBottom:16 }}>
                <div style={{ fontSize:10, color:"#c9a84c", letterSpacing:2, marginBottom:10 }}>COLABORADOR</div>
                {[["Nome",form.nome],["CPF",form.cpf],["E-mail",form.email],["WhatsApp",form.whatsapp||"—"],["Cargo",form.cargo],["Setor",form.setor],["Unidade",form.loja],["Razão Social",empresa.razaoSocial],["Data",fmtData(form.data)]].map(([k,v]) => (
                  <div key={k} style={{ display:"flex", justifyContent:"space-between", borderBottom:"1px solid #222", padding:"6px 0", fontSize:12 }}>
                    <span style={{ color:"#666" }}>{k}</span><span style={{ color:"#ddd" }}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{ background:"#1a1a1a", borderRadius:10, padding:18, marginBottom:18 }}>
                <div style={{ fontSize:10, color:"#c9a84c", letterSpacing:2, marginBottom:10 }}>TERMOS ({termosParaGerar.length})</div>
                {termosParaGerar.map(t => (
                  <div key={t.id} style={{ display:"flex", gap:8, alignItems:"center", padding:"5px 0", fontSize:12, color:"#bbb" }}>
                    <span style={{ color:"#c9a84c" }}>✓</span> {t.titulo}
                    <button onClick={() => setPreview({ titulo:t.titulo, texto:t.template(dados) })} style={{ marginLeft:"auto", fontSize:10, padding:"2px 8px", background:"transparent", border:"1px solid #333", borderRadius:4, color:"#888", cursor:"pointer" }}>ver</button>
                  </div>
                ))}
              </div>
              <div style={{ background:"#0d2a1a", border:"1px solid #1a5c33", borderRadius:10, padding:14, marginBottom:18 }}>
                <div style={{ fontSize:11, color:"#4caf82", letterSpacing:1, marginBottom:4 }}>✦ ASSINATURA DIGITAL VIA CLICKSIGN</div>
                <div style={{ fontSize:12, color:"#aaa" }}>O colaborador receberá um <strong style={{ color:"#ddd" }}>link por e-mail</strong> para assinar digitalmente.</div>
                <div style={{ fontSize:11, color:"#888", marginTop:6 }}>Destinatário: <strong style={{ color:"#ddd" }}>{form.email}</strong></div>
              </div>
              {erro && <div style={{ background:"#2a0d0d", border:"1px solid #5c1a1a", borderRadius:8, padding:12, fontSize:12, color:"#f08080", marginBottom:14 }}>❌ {erro}</div>}
              <div style={{ display:"flex", gap:10 }}>
                <button onClick={() => setEtapa(2)} style={S.btnSecondary} disabled={loading}>← Voltar</button>
                <button onClick={handleEnviar} disabled={loading} style={{...S.btnPrimary, flex:2, width:"auto", opacity: loading?0.7:1, cursor: loading?"wait":"pointer"}}>
                  {loading ? loadingMsg : "✦ Enviar para Assinatura Digital"}
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* SUCESSO */}
      {tela === "novo" && resultado && (
        <div style={{ maxWidth:500, margin:"70px auto", padding:"0 24px", textAlign:"center" }}>
          <div style={{ fontSize:52, marginBottom:14 }}>✅</div>
          <h2 style={{ fontSize:22, color:"#e8c96e", marginBottom:8 }}>Enviado para Assinatura!</h2>
          <p style={{ color:"#888", fontSize:13, marginBottom:6 }}><strong style={{ color:"#ddd" }}>{form.nome}</strong> recebeu o link no e-mail <strong style={{ color:"#ddd" }}>{form.email}</strong>.</p>
          <div style={{ background:"#111", border:"1px solid #222", borderRadius:10, padding:16, marginBottom:24 }}>
            <div style={{ fontSize:11, color:"#c9a84c", letterSpacing:1, marginBottom:8 }}>LINK DO ENVELOPE CLICKSIGN</div>
            <a href={resultado.link} target="_blank" rel="noreferrer" style={{ fontSize:12, color:"#4caf82", wordBreak:"break-all" }}>{resultado.link}</a>
          </div>
          <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
            <button onClick={() => { setTela("menu"); setResultado(null); }} style={{ padding:"10px 22px", background:"transparent", border:"1px solid #333", borderRadius:8, color:"#888", cursor:"pointer" }}>Início</button>
            <button onClick={() => { setTela("historico"); setResultado(null); }} style={{ padding:"10px 22px", background:"#c9a84c22", border:"1px solid #c9a84c44", borderRadius:8, color:"#e8c96e", cursor:"pointer" }}>Ver histórico</button>
          </div>
        </div>
      )}

      {/* HISTÓRICO */}
      {tela === "historico" && (
        <div style={{ maxWidth:820, margin:"36px auto", padding:"0 24px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22 }}>
            <h2 style={{ fontSize:18, color:"#e8c96e", fontWeight:500 }}>Histórico de Admissões</h2>
            <input value={busca} onChange={e => setBusca(e.target.value)} placeholder="Buscar por nome, CPF ou cargo..." style={{...S.input, width:260, boxSizing:"border-box"}} />
          </div>
          {historico.filter(c => c.nome?.toLowerCase().includes(busca.toLowerCase()) || c.cpf?.includes(busca) || c.cargo?.toLowerCase().includes(busca.toLowerCase())).length === 0
            ? <div style={{ textAlign:"center", padding:"60px 0", color:"#555" }}>{busca ? "Nenhum colaborador encontrado." : "Nenhum colaborador admitido ainda."}</div>
            : <div style={{ display:"grid", gap:10 }}>
                {historico.filter(c => c.nome?.toLowerCase().includes(busca.toLowerCase()) || c.cpf?.includes(busca) || c.cargo?.toLowerCase().includes(busca.toLowerCase())).map(c => (
                  <div key={c.id} style={{ background:"#111", border:"1px solid #222", borderRadius:10, padding:"14px 18px", display:"flex", alignItems:"center", gap:14 }}>
                    <div style={{ width:38, height:38, borderRadius:"50%", background:"#c9a84c22", border:"1px solid #c9a84c44", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, color:"#e8c96e", flexShrink:0 }}>{c.nome?.[0]||"?"}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:"#ddd" }}>{c.nome}</div>
                      <div style={{ fontSize:11, color:"#666" }}>{c.cargo} · {c.setor} · {c.loja}</div>
                      <div style={{ fontSize:10, color:"#444" }}>{c.razaoSocial}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:11, color:"#888" }}>{c.data ? fmtData(c.data) : "—"}</div>
                      <div style={{ fontSize:10, color: c.status==="aguardando_assinatura"?"#f0a500":"#4caf82", marginTop:3 }}>
                        {c.status==="aguardando_assinatura" ? "⏳ Aguardando" : "✅ Assinado"}
                      </div>
                      {c.linkAssinatura && <a href={c.linkAssinatura} target="_blank" rel="noreferrer" style={{ fontSize:10, color:"#4caf82", display:"block", marginTop:3 }}>Ver →</a>}
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>
      )}

      {/* PREVIEW MODAL */}
      {preview && (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"#000000bb", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:20 }}>
          <div style={{ background:"#fff", borderRadius:10, padding:"28px 32px", color:"#111", fontSize:11, lineHeight:1.8, whiteSpace:"pre-wrap", fontFamily:"monospace", maxWidth:700, maxHeight:"80vh", overflow:"auto", width:"100%" }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:16 }}>
              <strong>{preview.titulo}</strong>
              <button onClick={() => setPreview(null)} style={{ background:"transparent", border:"none", cursor:"pointer", fontSize:18, color:"#333" }}>✕</button>
            </div>
            {preview.texto}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

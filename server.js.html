<div style="padding: 1rem 0;">
<p style="font-size: 14px; color: var(--color-text-secondary); margin-bottom: 12px;">Clique para baixar o servidor.js correto:</p>
<button onclick="download()" style="padding: 10px 20px; font-size: 14px; cursor: pointer;">
  <i class="ti ti-download" aria-hidden="true"></i> Baixar servidor.js
</button>
<p id="status" style="font-size: 12px; color: var(--color-text-secondary); margin-top: 8px;"></p>
</div>
<script>
function download() {
  document.getElementById('status').textContent = 'Preparando...';
  const content = `const http = require("http");
const PORT = process.env.PORT || 3000;
const CLICKSIGN_BASE = "https://app.clicksign.com/api/v3";

function request(url, method, token, body) {
  return new Promise((resolve, reject) => {
    const u = new URL(url);
    const data = body ? JSON.stringify(body) : null;
    const options = {
      hostname: u.hostname,
      path: u.pathname + u.search,
      method: method,
      headers: {
        "Content-Type": "application/vnd.api+json",
        "Authorization": token,
        ...(data ? { "Content-Length": Buffer.byteLength(data) } : {}),
      },
    };
    const https = require("https");
    const req = https.request(options, function(res) {
      let raw = "";
      res.on("data", function(c) { raw += c; });
      res.on("end", function() {
        try { resolve({ status: res.statusCode, body: JSON.parse(raw) }); }
        catch(e) { resolve({ status: res.statusCode, body: raw }); }
      });
    });
    req.on("error", reject);
    if (data) req.write(data);
    req.end();
  });
}

const server = http.createServer(function(req, res) {
  res.setHeader("Access-Control-Allow-Origin", "*");
  res.setHeader("Access-Control-Allow-Methods", "POST, OPTIONS, GET");
  res.setHeader("Access-Control-Allow-Headers", "Content-Type");

  if (req.method === "OPTIONS") {
    res.writeHead(204);
    res.end();
    return;
  }

  if (req.method === "GET" && req.url === "/") {
    const fs = require("fs");
    const path = require("path");
    const htmlPath = path.join(__dirname, "index.html");
    if (fs.existsSync(htmlPath)) {
      res.writeHead(200, { "Content-Type": "text/html; charset=utf-8" });
      res.end(fs.readFileSync(htmlPath));
    } else {
      res.writeHead(200, { "Content-Type": "application/json" });
      res.end(JSON.stringify({ status: "MR. CAPAS ClickSign Server online" }));
    }
    return;
  }

  if (req.method !== "POST" || req.url !== "/enviar") {
    res.writeHead(404);
    res.end(JSON.stringify({ error: "Not found" }));
    return;
  }

  let body = "";
  req.on("data", function(c) { body += c; });
  req.on("end", async function() {
    try {
      const payload = JSON.parse(body);
      const token = payload.clicksign_token;
      const colaborador = payload.colaborador;
      const documento = payload.documento;

      if (!token || !colaborador || !documento) {
        res.writeHead(400);
        res.end(JSON.stringify({ error: "Dados incompletos" }));
        return;
      }

      console.log("INICIO - Colaborador:", colaborador.nome, colaborador.email);

      // 1. Criar envelope
      const envBody = {
        data: {
          type: "envelopes",
          attributes: {
            name: "Admissao - " + colaborador.nome + " - " + colaborador.data,
            locale: "pt-BR",
            auto_close: true,
            remind_interval: 3,
            block_after_refusal: true
          }
        }
      };
      const env = await request(CLICKSIGN_BASE + "/envelopes", "POST", token, envBody);
      console.log("ENVELOPE STATUS:", env.status, JSON.stringify(env.body).substring(0, 200));

      if (env.status !== 201) {
        res.writeHead(500);
        res.end(JSON.stringify({ error: "Erro ao criar envelope", detail: env.body }));
        return;
      }
      const envelopeId = env.body.data.id;
      console.log("ENVELOPE ID:", envelopeId);

      // 2. Adicionar documento
      const docBody = {
        data: {
          type: "documents",
          attributes: {
            filename: documento.nome,
            content_base64: "data:application/pdf;base64," + documento.pdf_base64
          }
        }
      };
      const doc = await request(CLICKSIGN_BASE + "/envelopes/" + envelopeId + "/documents", "POST", token, docBody);
      console.log("DOC STATUS:", doc.status, JSON.stringify(doc.body).substring(0, 200));

      if (doc.status !== 201) {
        res.writeHead(500);
        res.end(JSON.stringify({ error: "Erro ao adicionar documento", detail: doc.body }));
        return;
      }

      // 3. Adicionar signatario
      const sigBody = {
        data: {
          type: "requirements",
          attributes: {
            action: "sign",
            name: colaborador.nome,
            email: colaborador.email,
            communicate_events: {
              document_signed: { email: { active: true }, whatsapp: { active: false } },
              envelope_finished: { email: { active: true } }
            }
          }
        }
      };
      if (colaborador.cpf && colaborador.cpf.replace(/\\D/g,"").length >= 11) {
        sigBody.data.attributes.cpf = colaborador.cpf.replace(/\\D/g,"");
      }
      const sig = await request(CLICKSIGN_BASE + "/envelopes/" + envelopeId + "/requirements", "POST", token, sigBody);
      console.log("SIG STATUS:", sig.status, JSON.stringify(sig.body).substring(0, 300));

      if (sig.status !== 201) {
        res.writeHead(500);
        res.end(JSON.stringify({ error: "Erro ao adicionar signatario", detail: sig.body }));
        return;
      }

      // 4. Ativar envelope
      const ativBody = { data: { type: "envelopes", id: envelopeId } };
      const ativ = await request(CLICKSIGN_BASE + "/envelopes/" + envelopeId + "/activate", "PATCH", token, ativBody);
      console.log("ATIV STATUS:", ativ.status, JSON.stringify(ativ.body).substring(0, 200));

      if (ativ.status !== 200) {
        res.writeHead(500);
        res.end(JSON.stringify({ error: "Erro ao ativar envelope", detail: ativ.body }));
        return;
      }

      console.log("SUCESSO - Envelope:", envelopeId);
      res.writeHead(200, { "Content-Type": "application/json" });
      res.end(JSON.stringify({
        envelopeId: envelopeId,
        link: "https://app.clicksign.com/sign/" + envelopeId,
        status: "enviado"
      }));

    } catch(e) {
      console.log("ERRO:", e.message, e.stack);
      res.writeHead(500);
      res.end(JSON.stringify({ error: e.message }));
    }
  });
});

server.listen(PORT, function() {
  console.log("Servidor MR. CAPAS rodando na porta " + PORT);
});`;

  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'servidor.js';
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('status').textContent = 'Baixado! Faça o upload no GitHub.';
}
</script>

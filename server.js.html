<div style="padding: 1rem 0;">
<p style="font-size: 14px; color: var(--color-text-secondary); margin-bottom: 12px;">Clique no botão abaixo para baixar o server.js atualizado:</p>
<button onclick="download()" style="padding: 10px 20px; font-size: 14px; cursor: pointer;">
  <i class="ti ti-download" aria-hidden="true"></i> Baixar server.js
</button>
</div>

<script>
function download() {
  const content = `const http = require("http");

const PORT = process.env.PORT || 3000;
const CLICKSIGN_BASE = "https://app.clicksign.com/api/v3";

function request(url, method, token, body) {
  return new Promise((resolve, reject) => {
    const u = new URL(url);
    const data = body ? JSON.stringify(body) : null;
    const options = {
      hostname: u.hostname,
      path: u.pathname + u.search,
      method,
      headers: {
        "Content-Type": "application/vnd.api+json",
        Authorization: token,
        ...(data ? { "Content-Length": Buffer.byteLength(data) } : {}),
      },
    };
    const https = require("https");
    const req = https.request(options, (res) => {
      let raw = "";
      res.on("data", (c) => (raw += c));
      res.on("end", () => {
        try { resolve({ status: res.statusCode, body: JSON.parse(raw) }); }
        catch { resolve({ status: res.statusCode, body: raw }); }
      });
    });
    req.on("error", reject);
    if (data) req.write(data);
    req.end();
  });
}

const server = http.createServer(async (req, res) => {
  res.setHeader("Access-Control-Allow-Origin", "*");
  res.setHeader("Access-Control-Allow-Methods", "POST, OPTIONS, GET");
  res.setHeader("Access-Control-Allow-Headers", "Content-Type");

  if (req.method === "OPTIONS") {
    res.writeHead(204);
    res.end();
    return;
  }

  if (req.method === "GET" && req.url === "/") {
    const fs = require("fs");
    const path = require("path");
    const htmlPath = path.join(__dirname, "index.html");
    if (fs.existsSync(htmlPath)) {
      res.writeHead(200, { "Content-Type": "text/html; charset=utf-8" });
      res.end(fs.readFileSync(htmlPath));
    } else {
      res.writeHead(200, { "Content-Type": "application/json" });
      res.end(JSON.stringify({ status: "MR. CAPAS ClickSign Server online" }));
    }
    return;
  }

  if (req.method !== "POST" || req.url !== "/enviar") {
    res.writeHead(404);
    res.end(JSON.stringify({ error: "Not found" }));
    return;
  }

  let body = "";
  req.on("data", (c) => (body += c));
  req.on("end", async () => {
    try {
      const payload = JSON.parse(body);
      const { clicksign_token, colaborador, documento } = payload;

      if (!clicksign_token || !colaborador || !documento) {
        res.writeHead(400);
        res.end(JSON.stringify({ error: "Dados incompletos" }));
        return;
      }

      const env = await request(CLICKSIGN_BASE + "/envelopes", "POST", clicksign_token, {
        data: {
          type: "envelopes",
          attributes: {
            name: "Admissao - " + colaborador.nome + " - " + colaborador.data,
            locale: "pt-BR",
            auto_close: true,
            remind_interval: 3,
            block_after_refusal: true,
          },
        },
      });

      if (env.status !== 201) {
        res.writeHead(500);
        res.end(JSON.stringify({ error: "Erro ao criar envelope", detail: env.body }));
        return;
      }

      const envelopeId = env.body.data.id;

      const doc = await request(CLICKSIGN_BASE + "/envelopes/" + envelopeId + "/documents", "POST", clicksign_token, {
        data: {
          type: "documents",
          attributes: {
            filename: documento.nome,
            content_base64: "data:application/pdf;base64," + documento.pdf_base64,
          },
        },
      });

      if (doc.status !== 201) {
        res.writeHead(500);
        res.end(JSON.stringify({ error: "Erro ao adicionar documento", detail: doc.body }));
        return;
      }

      const sigPayload = {
        data: {
          type: "requirements",
          attributes: {
            action: "sign",
            name: colaborador.nome,
            email: colaborador.email,
            communicate_events: {
              document_signed: { email: { active: true }, whatsapp: { active: false } },
              envelope_finished: { email: { active: true } },
            },
          },
        },
      };

      if (colaborador.cpf && colaborador.cpf.length >= 11) {
        sigPayload.data.attributes.cpf = colaborador.cpf;
      }

      const sig = await request(CLICKSIGN_BASE + "/envelopes/" + envelopeId + "/requirements", "POST", clicksign_token, sigPayload);

      if (sig.status !== 201) {
        res.writeHead(500);
        res.end(JSON.stringify({ error: "Erro ao adicionar signatario", detail: sig.body }));
        return;
      }

      const ativ = await request(CLICKSIGN_BASE + "/envelopes/" + envelopeId + "/activate", "PATCH", clicksign_token, {
        data: { type: "envelopes", id: envelopeId },
      });

      if (ativ.status !== 200) {
        res.writeHead(500);
        res.end(JSON.stringify({ error: "Erro ao ativar envelope", detail: ativ.body }));
        return;
      }

      res.writeHead(200, { "Content-Type": "application/json" });
      res.end(JSON.stringify({
        envelopeId,
        link: "https://app.clicksign.com/sign/" + envelopeId,
        status: "enviado",
      }));

    } catch (e) {
      res.writeHead(500);
      res.end(JSON.stringify({ error: e.message }));
    }
  });
});

server.listen(PORT, () => {
  console.log("Servidor MR. CAPAS rodando na porta " + PORT);
});`;

  const blob = new Blob([content], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'servidor.js';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
